<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Salon Rich</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        /* --- Premium Dashboard Styles --- */
        .dashboard-container {
            max-width: 1000px; margin: 60px auto;
            display: grid; grid-template-columns: 1fr 2fr; gap: 30px; padding: 0 20px;
        }

        /* Left Sidebar (Profile Card) */
        .profile-card {
            background: var(--secondary-dark); padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255, 215, 0, 0.15);
            height: fit-content;
        }
        .profile-pic {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--gold); object-fit: cover; margin-bottom: 15px;
        }
        .vip-badge {
            background: linear-gradient(45deg, #ffd700, #ffaa00); color: #000;
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
            display: inline-block; margin-bottom: 15px;
        }
        .stats-box {
            background: #111; padding: 15px; border-radius: 10px; margin-top: 20px;
            border: 1px dashed rgba(255, 215, 0, 0.3);
        }

        /* Right Content Area */
        .content-card {
            background: var(--secondary-dark); padding: 30px; border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.15); margin-bottom: 30px;
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;
        }
        
        /* Edit Mode Styles */
        .contact-info-display { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-radius: 8px; }
        .edit-form { display: none; background: #111; padding: 15px; border-radius: 8px; }
        .edit-form input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 5px; }
        
        /* Bookings Styles */
        .booking-card {
            background: var(--primary-dark); padding: 20px; margin-bottom: 15px;
            border-radius: 10px; border-left: 4px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .booking-card:hover { transform: translateX(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #ffaa00; color: #000; }
        .status-accepted { background: #4CAF50; color: #fff; }
        .status-cancelled { background: #f44336; color: #fff; }
        
        .btn-cancel {
            background: transparent; border: 1px solid #f44336; color: #f44336;
            padding: 6px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 12px;
        }
        .btn-cancel:hover { background: #f44336; color: #fff; }

        /* Toast Notification */
        .toast {
            position: fixed; bottom: 30px; right: 30px; background: #4CAF50; color: white;
            padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(100px); opacity: 0; transition: 0.4s; z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        
        /* Responsive */
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">✨ Salon Rich</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <button id="navLogout" class="btn-primary" style="padding: 6px 15px; font-size: 14px;">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="profile-card">
            <img id="userPhoto" src="https://via.placeholder.com/150" class="profile-pic" alt="User Photo">
            <div class="vip-badge">Premium Member</div>
            <h2 id="userName" style="margin: 10px 0 5px; color: var(--gold);">Loading...</h2>
            <p id="userEmail" style="color: var(--text-gray); font-size: 14px; margin: 0;">Loading...</p>
            
            <div class="stats-box">
                <h4 style="margin: 0; color: #fff;">Total Appointments</h4>
                <p id="totalBookings" style="font-size: 24px; color: var(--gold); font-weight: bold; margin: 5px 0 0;">0</p>
            </div>
        </div>

        <div>
            <div class="content-card">
                <div class="section-header">
                    <h3 style="margin: 0;">Contact Details</h3>
                    <button id="btnEdit" class="btn-primary" style="padding: 6px 15px; font-size: 12px;">✏️ Edit</button>
                </div>

                <div id="displayMode" class="contact-info-display">
                    <div>
                        <p style="margin: 0; color: var(--text-gray); font-size: 12px;">Phone Number</p>
                        <h4 id="displayPhone" style="margin: 5px 0 0; color: #fff;">Not added yet</h4>
                    </div>
                </div>

                <form id="editForm" class="edit-form">
                    <label style="color: var(--text-gray); font-size: 14px;">Enter Phone Number:</label>
                    <input type="tel" id="inputPhone" placeholder="Ex: 0771234567" required>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button type="submit" class="btn-primary" style="flex: 1;">Save Changes</button>
                        <button type="button" id="btnCancelEdit" class="btn-primary" style="flex: 1; background: transparent; border: 1px solid var(--text-gray); color: var(--text-gray);">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="content-card">
                <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0;">My Appointments</h3>
                <div id="bookingsList">
                    <p style="text-align: center; color: var(--text-gray);">Loading your appointments...</p>
                </div>
            </div>
        </div>

    </div>

    <div id="toastMessage" class="toast">Profile updated successfully!</div>

    <script type="module" src="../js/profile.js"></script>
</body>
</html>
