    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Gallery | Salon Rich</title>
        <link rel="stylesheet" href="../css/global.css">
        <style>
            .admin-container {
                max-width: 1000px; margin: 50px auto; background: var(--secondary-dark);
                padding: 40px; border-radius: 10px; border: 1px solid var(--gold);
            }
            .upload-section {
                background: #111; padding: 30px; border-radius: 8px; margin-bottom: 30px;
                border: 1px dashed var(--gold); text-align: center;
            }
            .upload-section input[type="file"] {
                margin-bottom: 20px; color: white; padding: 10px; border: 1px solid #333;
                border-radius: 5px; background: #1a1a1a; width: 80%; max-width: 400px;
            }
            
            .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
            .gallery-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; transition: 0.3s; }
            .gallery-card:hover { border-color: var(--gold); transform: translateY(-5px); }
            .gallery-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
            
            .delete-btn { background-color: transparent; color: #F44336; border: 1px solid #F44336; padding: 8px 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
            .delete-btn:hover { background-color: #F44336; color: white; }
        </style>
    </head>
    <body>

        <nav class="navbar">
            <a href="../index.html" class="logo">✨ Salon Rich - GALLERY MGMT</a>
            <div class="nav-links">
                <a href="admin_dashboard.html" style="margin-right: 15px; color: var(--gold);">⬅ Back to Dashboard</a>
                <button id="navLogout" class="btn-primary">Logout</button>
            </div>
        </nav>

        <div class="admin-container">
            <h2 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px; color: #fff;">Manage Salon Gallery</h2>
            
            <div class="upload-section">
                <h3 style="color: var(--gold); margin-top: 0;">Upload New Image</h3>
                <input type="file" id="imageInput" accept="image/*">
                <br>
                <button id="uploadBtn" class="btn-primary" style="padding: 12px 30px;">Upload Image</button>
                <p id="uploadStatus" style="color: #4CAF50; margin-top: 15px; font-weight: bold;"></p>
            </div>

            <h3 style="color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;">Currently Uploaded Images</h3>
            <div class="gallery-grid" id="galleryGrid">
                <p style="color: var(--text-gray);">Loading gallery images...</p>
            </div>
        </div>

        <script type="module" src="../js/admin_gallery.js"></script>
    </body>
    </html>
