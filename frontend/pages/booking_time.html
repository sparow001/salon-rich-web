<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Salon Rich</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    
    <style>
        :root {
            --gold: #FFD700;
            --gold-hover: #e6c200;
            --dark-bg: #0F0F0F;
            --card-bg: #1A1A1A;
            --input-bg: #242424;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
        }

        /* 🌟 Facebook Style Centered Background 🌟 */
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Poppins', sans-serif; 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px 15px; 
            box-sizing: border-box;
        }

        .back-link {
            position: absolute; top: 20px; left: 20px; color: var(--gold);
            text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: 0.3s;
        }
        .back-link:hover { transform: translateX(-3px); }

        /* 🌟 Premium Card Layout 🌟 */
        .booking-card { 
            background: var(--card-bg); 
            padding: 35px 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 215, 0, 0.1); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 450px; 
            box-sizing: border-box;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0 0 5px; font-size: 26px; text-align: center;}
        .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; text-align: center;}

        .form-group label { display: block; font-size: 13px; color: #ccc; margin-bottom: 10px; font-weight: 500;}
        
        /* Quick Pills */
        .quick-pills { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .quick-pills::-webkit-scrollbar { height: 0; }
        .pill { background: var(--input-bg); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: 0.3s; }
        .pill.active { background: rgba(255, 215, 0, 0.15); border-color: var(--gold); color: var(--gold); font-weight: 600; }

        /* Date Slider */
        .date-selection-wrapper { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .date-slider { display: flex; gap: 10px; overflow-x: auto; flex-grow: 1; padding-bottom: 5px; scroll-behavior: smooth; }
        .date-slider::-webkit-scrollbar { height: 0; }
        .date-card { background: var(--input-bg); min-width: 60px; padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .date-card:hover { border-color: rgba(255, 215, 0, 0.5); }
        .date-card.active { background: var(--gold); color: #000; border-color: var(--gold); transform: translateY(-2px); }
        .date-card .day { font-size: 11px; font-weight: 500; text-transform: uppercase; }
        .date-card .date { font-size: 18px; font-weight: 700; margin-top: 2px; }

        .calendar-btn { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); border-radius: 12px; font-size: 18px; cursor: pointer; padding: 12px; transition: 0.3s; color: white;}
        .calendar-btn:hover { background: var(--gold); color: #000; }

        /* Time Slots */
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; max-height: 220px; overflow-y: auto; padding-right: 5px; }
        .slots-grid::-webkit-scrollbar { width: 5px; }
        .slots-grid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        .slot { background: var(--input-bg); border: 1px solid #333; padding: 10px 5px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .slot.available:hover { border-color: var(--gold); color: var(--gold); }
        .slot.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; transform: scale(1.05); }
        .slot.booked { opacity: 0.4; cursor: not-allowed; background: #111; border-color: #222; }
        .slot.past { opacity: 0.2; cursor: not-allowed; }

        .btn-main { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 25px; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-main:hover:not(:disabled) { background: var(--gold-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,215,0,0.2); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 480px) {
            .booking-card { padding: 25px 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="booking-card">
        <h1 id="modalTitle">Book Appointment</h1>
        <p class="subtitle" id="serviceSubtitle">Select your preferred date and time</p>

        <form id="bookingForm">
            <input type="hidden" id="selectedService">
            
            <div class="form-group">
                <label>Select Date:</label>
                <div class="quick-pills">
                    <div class="pill active" id="pillToday">Today</div>
                    <div class="pill" id="pillTomorrow">Tomorrow</div>
                    <div class="pill" id="pillWeekend">This Weekend</div>
                </div>
                <div class="date-selection-wrapper">
                    <div class="date-slider" id="dateSlider"></div>
                    <button type="button" class="calendar-btn" id="btnOpenCalendar" title="Pick another date"><i class="far fa-calendar-alt"></i></button>
                    <input type="text" id="hiddenFlatpickr" style="display: none;"> 
                </div>
            </div>

            <div class="form-group" style="margin-top: 25px;">
                <label>Select Time Slot:</label>
                <div id="timeSlotsContainer" class="slots-grid">
                    <p style="color: var(--text-muted); font-size: 13px; grid-column: 1 / -1; text-align: center;">Loading premium slots...</p>
                </div>
            </div>

            <button type="submit" id="btnConfirmBooking" class="btn-main" disabled>
                Select a Time Slot
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module" src="../js/booking_time.js"></script>
</body>
</html>
